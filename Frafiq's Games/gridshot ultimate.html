<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aim Trainer</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #bee8ee;
            font-family: Arial, sans-serif;
            cursor: crosshair;
            user-select: none;
        }

        canvas {
            display: block;
            margin: 0;
            background-color: #bee8ee;
            position: absolute;
            top: 0;
            left: 0;
        }

        .score, .timer, .game-over {
            position: absolute;
            z-index: 100;
            user-select: none;
        }

        .score {
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: black;
        }

        .timer {
            top: 10px;
            right: 10px;
            font-size: 24px;
            color: black;
        }

        .game-over {
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: black;
            text-align: center;
            display: none;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    <div id="score" class="score">Score: 0</div>
    <div id="timer" class="timer">Time: 30</div>
    <div id="gameOverMessage" class="game-over">Game Over! Final Score: <span id="finalScore"></span></div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const gridSize = 3; // 3x3 grid
        const targetRadius = 50; // Radius of the target
        const targetCount = 2; // Number of active targets
        let gridPositions = [];
        let activeTargets = [];
        let score = 0;
        let gameOver = false;
        let timer = 30;
        let timerStarted = false;
        let timerInterval;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            generateGridPositions();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Target {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.radius = targetRadius;
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ff6347';
                ctx.fill();
                ctx.closePath();
            }

            checkHit(mouseX, mouseY) {
                const dx = this.x - mouseX;
                const dy = this.y - mouseY;
                return Math.sqrt(dx * dx + dy * dy) < this.radius;
            }
        }

        function generateGridPositions() {
            gridPositions = [];
            const gridWidth = canvas.width * 0.6; // Occupy 60% of the canvas width
            const gridHeight = canvas.height * 0.6; // Occupy 60% of the canvas height
            const startX = (canvas.width - gridWidth) / 2;
            const startY = (canvas.height - gridHeight) / 2;
            const cellWidth = gridWidth / gridSize;
            const cellHeight = gridHeight / gridSize;

            for (let row = 0; row < gridSize; row++) {
                for (let col = 0; col < gridSize; col++) {
                    const x = startX + col * cellWidth + cellWidth / 2;
                    const y = startY + row * cellHeight + cellHeight / 2;
                    gridPositions.push({ x, y });
                }
            }
        }

        function activateRandomTargets() {
            activeTargets = [];
            const usedIndices = new Set();
            while (activeTargets.length < targetCount) {
                const randomIndex = Math.floor(Math.random() * gridPositions.length);
                if (!usedIndices.has(randomIndex)) {
                    usedIndices.add(randomIndex);
                    const { x, y } = gridPositions[randomIndex];
                    activeTargets.push(new Target(x, y));
                }
            }
        }

        canvas.addEventListener('mousedown', function (event) {
            const rect = canvas.getBoundingClientRect();
            const mouseX = event.clientX - rect.left;
            const mouseY = event.clientY - rect.top;

            if (!timerStarted) {
                startTimer();
                timerStarted = true;
            }

            for (let i = 0; i < activeTargets.length; i++) {
                if (activeTargets[i].checkHit(mouseX, mouseY)) {
                    teleportTarget(i);
                    score++;
                    break; // Only teleport one target per click
                }
            }

            document.getElementById('score').textContent = `Score: ${score}`;
        });

        function teleportTarget(index) {
            const usedIndices = new Set(activeTargets.map(target => gridPositions.findIndex(pos => pos.x === target.x && pos.y === target.y)));
            let randomIndex;
            do {
                randomIndex = Math.floor(Math.random() * gridPositions.length);
            } while (usedIndices.has(randomIndex));

            const { x, y } = gridPositions[randomIndex];
            activeTargets[index] = new Target(x, y);
        }

        function startTimer() {
            timerInterval = setInterval(() => {
                if (timer <= 0) {
                    clearInterval(timerInterval);
                    gameOver = true;
                    document.getElementById('gameOverMessage').style.display = 'block';
                    document.getElementById('finalScore').textContent = score;
                } else {
                    timer--;
                    document.getElementById('timer').textContent = `Time: ${timer}`;
                }
            }, 1000);
        }

        function updateGame() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            activeTargets.forEach(target => target.draw());

            if (!gameOver) {
                requestAnimationFrame(updateGame);
            }
        }

        generateGridPositions();
        activateRandomTargets();
        updateGame();
    </script>
</body>
</html>
